blueprint:
  name: LD2450 Coordinator Fallback Watchdog
  description: >
    Manages the LD2450-ZB-H2 soft/hard two-tier fallback system.

    **Soft fallback** fires per-sensor when a single APS ACK times out — the
    sensor controls its bound light directly for a few seconds until the
    coordinator responds. The `soft_fault` sensor entity increments so HA can
    observe and react.

    **Hard fallback** activates if the coordinator is unreachable for
    `hard_timeout_sec` seconds. It is sticky and must be explicitly cleared
    (this blueprint does that on recovery).

    **Heartbeat watchdog** (optional): send periodic pings so the device can
    detect coordinator *software* death even when the radio hardware (dongle)
    is still ACKing.

    **Setup:**
    1. Enable `fallback_enable` on each sensor via Z2M or HA.
    2. Optionally enable `heartbeat_enable` and set `heartbeat_interval` on
       each sensor (default 120 s). This blueprint pings every minute, so the
       watchdog fires only if HA itself is down for longer than 2 × interval.
    3. Install this blueprint and select your LD2450 sensors.

    **What this automation does:**
    - Sends a heartbeat ping to each sensor on the configured schedule.
    - When a sensor is in **hard fallback** (`fallback_mode` switch is on),
      clears it on the next heartbeat cycle — allowing HA automations to
      resume control of lights.
    - Clears hard fallback after Z2M reconnects (covers Z2M-only restarts where
      HA missed the fallback_mode transition while Z2M was offline).
    - Clears hard fallback after HA restarts (covers full server reboots).
    - Optional: sends a persistent notification when a soft fault is detected.

  domain: automation
  author: LD2450-ZB-H2
  input:
    sensors:
      name: LD2450 Sensors
      description: >
        Select the **main occupancy entity** for each LD2450-ZB-H2 sensor.
        This is `binary_sensor.<device_name>_occupancy` (without a zone number).
        The blueprint uses this to find the fallback_mode switch and soft_fault
        sensor on the same device automatically.
      selector:
        entity:
          multiple: true
          filter:
            - integration: mqtt
              device_class: occupancy


    recovery_delay:
      name: Recovery delay (seconds)
      description: >
        How long to wait after HA restarts before clearing hard fallback.
        Gives Z2M and HA automations time to fully initialise.
      default: 60
      selector:
        number:
          min: 10
          max: 300
          unit_of_measurement: s
          step: 5

    multi_sensor_recheck_delay:
      name: Multi-sensor re-check delay (seconds)
      description: >
        If only one sensor enters hard fallback while others are normal, wait
        this long before clearing it. This guards against a single sensor
        having a real but localised failure vs a true coordinator outage.
        Set to 0 to disable (clear immediately regardless of other sensors).
      default: 30
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: s
          step: 5

    z2m_bridge_entity:
      name: Zigbee2MQTT bridge connection entity
      description: >
        The binary sensor that tracks Z2M bridge connectivity. Used to detect
        Z2M restarts and re-check hard fallback state after reconnection.
        Default matches the standard Z2M HA integration entity name.
      default: binary_sensor.zigbee2mqtt_bridge_connection_state
      selector:
        entity:
          domain: binary_sensor

    notify_on_soft_fault:
      name: Notify on soft fault
      description: >
        Send an HA persistent notification when a sensor has a non-zero soft
        fault count (checked each heartbeat cycle). Useful for monitoring
        network jitter. Disable if too noisy.
      default: false
      selector:
        boolean:

mode: parallel
max: 10

trigger:
  # Periodic heartbeat — every minute (device-side heartbeat_interval controls watchdog timeout)
  - platform: time_pattern
    minutes: "/1"
    id: heartbeat

  # Z2M reconnect — re-check hard fallback after Z2M comes back online
  - platform: state
    entity_id: !input z2m_bridge_entity
    to: "on"
    id: z2m_reconnect

  # HA startup — clear hard fallback after recovery delay
  - platform: homeassistant
    event: start
    id: ha_start

action:
  - choose:

      # ---- Heartbeat ping + fallback recovery ----
      - conditions:
          - condition: trigger
            id: heartbeat
        sequence:
          - repeat:
              for_each: !input sensors
              sequence:
                - service: mqtt.publish
                  data:
                    topic: >-
                      zigbee2mqtt/{{ device_attr(device_id(repeat.item), 'name') }}/set
                    payload: '{"heartbeat": "ping"}'
                # Find the fallback_mode switch on the same device
                # If it's on, coordinator is reachable (ping went through) so clear it
                - condition: template
                  value_template: >-
                    {% set dev = device_id(repeat.item) %}
                    {% set fb = device_entities(dev) | select('search', 'fallback_mode') | list | first | default('') %}
                    {{ fb != '' and is_state(fb, 'on') }}
                - service: mqtt.publish
                  data:
                    topic: >-
                      zigbee2mqtt/{{ device_attr(device_id(repeat.item), 'name') }}/set
                    payload: '{"fallback_mode": false}'

      # ---- Z2M reconnect recovery ----
      - conditions:
          - condition: trigger
            id: z2m_reconnect
        sequence:
          # Give Z2M time to re-read device states before checking
          - delay:
              seconds: 15
          - repeat:
              for_each: !input sensors
              sequence:
                - condition: template
                  value_template: >-
                    {% set dev = device_id(repeat.item) %}
                    {% set fb = device_entities(dev) | select('search', 'fallback_mode') | list | first | default('') %}
                    {{ fb != '' and is_state(fb, 'on') }}
                - service: mqtt.publish
                  data:
                    topic: >-
                      zigbee2mqtt/{{ device_attr(device_id(repeat.item), 'name') }}/set
                    payload: '{"fallback_mode": false}'

      # ---- HA startup recovery ----
      - conditions:
          - condition: trigger
            id: ha_start
        sequence:
          - delay:
              seconds: !input recovery_delay
          - repeat:
              for_each: !input sensors
              sequence:
                - condition: template
                  value_template: >-
                    {% set dev = device_id(repeat.item) %}
                    {% set fb = device_entities(dev) | select('search', 'fallback_mode') | list | first | default('') %}
                    {{ fb != '' and is_state(fb, 'on') }}
                - service: mqtt.publish
                  data:
                    topic: >-
                      zigbee2mqtt/{{ device_attr(device_id(repeat.item), 'name') }}/set
                    payload: '{"fallback_mode": false}'
